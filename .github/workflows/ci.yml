name: CI

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t peripool:ci .

      - name: Smoke test the container
        run: |
          docker run -d --name peripool-smoke -p 5000:5000 \
            -e FLASK_CONFIG=development -e SECRET_KEY=ci-smoke-test-key \
            peripool:ci

          success=0
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/ | grep -q "PeriPool"; then
              success=1
              break
            fi
            sleep 1
          done

          docker logs peripool-smoke
          docker stop peripool-smoke

          if [ "$success" -ne 1 ]; then
            echo "Container did not respond correctly"
            exit 1
          fi

          echo "Container responded successfully"
