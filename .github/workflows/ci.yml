name: CI

'on':
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.14'
          cache: 'pip'
          cache-dependency-path: requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Lint with ruff
        run: ruff check .

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=term-missing --cov-fail-under=80

      - name: Audit dependencies for known vulnerabilities
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt

  docker:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v7

      - name: Build Docker image
        run: docker build -t peripool:ci .

      - name: Smoke test the container
        run: |
          docker run -d --name peripool-smoke -p 5000:5000 \
            -e FLASK_CONFIG=development -e SECRET_KEY=ci-smoke-test-key \
            peripool:ci

          success=0
          for i in $(seq 1 20); do
            if curl -sf http://localhost:5000/ | grep -q "PeriPool"; then
              success=1
              break
            fi
            sleep 1
          done

          if [ "$success" -eq 1 ]; then
            # The home page doesn't touch the database — separately check a page
            # that does, to catch a seeded-but-tableless database (a real bug
            # this once missed: the app could serve 200s while every DB-backed
            # page 500s underneath it). The catalogue now requires login, so log
            # in as the seeded employee user first and reuse that session.
            cookie_jar=$(mktemp)
            login_page=$(curl -sc "$cookie_jar" http://localhost:5000/login)
            csrf_token=$(echo "$login_page" | grep -o 'csrf_token"[^>]*value="[^"]*"' | grep -o 'value="[^"]*"' | head -1 | sed 's/value="//;s/"$//')

            curl -sb "$cookie_jar" -c "$cookie_jar" -X POST http://localhost:5000/login \
              --data-urlencode "email=user@example.com" \
              --data-urlencode "password=Password!1" \
              --data-urlencode "csrf_token=$csrf_token" \
              -o /dev/null

            if ! curl -sf -b "$cookie_jar" http://localhost:5000/catalogue | grep -q "Jabra"; then
              success=0
            fi

            rm -f "$cookie_jar"
          fi

          docker logs peripool-smoke
          docker stop peripool-smoke

          if [ "$success" -ne 1 ]; then
            echo "Container did not respond correctly"
            exit 1
          fi

          echo "Container responded successfully"
