{% extends "base.html" %}
{% from "macros.html" import render_field %}

{% block title %}PeriPool | Login{% endblock %}

{% block content %}
<section>
    <h2>Log in</h2>

    <form method="post">
        {{ form.hidden_tag() }}

        {{ render_field(form.email) }}
        {{ render_field(form.password) }}

        <button type="submit">Log in</button>
    </form>
</section>
{% endblock %}
